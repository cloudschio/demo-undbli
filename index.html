<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam & Sari | Undangan Pernikahan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f6f1ea;
      --card:rgba(255,255,255,.72);
      --text:#1d1713;
      --muted:#6f665f;
      --gold:#c79a5a;
      --gold2:#9c6d2d;
      --line:rgba(199,154,90,.2);
      --shadow:0 18px 50px rgba(35,25,17,.12);
    }
    body{
      font-family:'Manrope',sans-serif;
      background:radial-gradient(circle at top,rgba(199,154,90,.22),transparent 24%),linear-gradient(180deg,#f7f0e8,#efe4d7);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }
    h1,h2,h3{
      font-family:'Cormorant Garamond',serif;
    }
    .bg{
      position:fixed;inset:0;
      background:linear-gradient(130deg,rgba(199,154,90,.14),transparent 35%,rgba(156,109,45,.12));
      z-index:0;pointer-events:none;
    }
    .opening-screen{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:90;
      background:linear-gradient(180deg,rgba(246,241,234,.95),rgba(255,255,255,.98));
      transition:.4s ease;overflow:hidden;
    }
    .opening-card{
      max-width:420px;width:calc(100% - 28px);padding:40px 24px 34px;text-align:center;position:relative;overflow:hidden;
      border:1px solid rgba(199,154,90,.22);border-radius:26px;
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg,rgba(255,255,255,.76),rgba(255,255,255,.58));
      box-shadow:0 22px 60px rgba(35,25,17,.11),inset 0 1px 0 rgba(255,255,255,.55);
      animation:cardEnter .9s cubic-bezier(.2,.8,.2,1);
    }
    .opening-card::after{
      content:"";position:absolute;left:-20px;bottom:-20px;width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(199,154,90,.16),transparent 70%);pointer-events:none;
    }
    .eyebrow,.opening-sub{
      font-size:.8rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);
    }
    .opening-names{
      display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1;margin:10px 0 10px;
    }
    .opening-names span{
      display:block;font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,8vw,4.6rem);font-weight:700;
      color:transparent;background:linear-gradient(180deg,#cda061,#8f6327);-webkit-background-clip:text;background-clip:text;
    }
    .opening-names .amp{
      font-size:clamp(2rem,6vw,3rem);line-height:1;margin:2px 0 4px;
    }
    .opening-date{font-size:1.05rem;margin-bottom:22px}
    .page{
      position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:18px 14px 28px;overflow:hidden;
    }
    .hidden{display:none}
    .glass{
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg,rgba(255,255,255,.76),rgba(255,255,255,.58));
      border:1px solid rgba(199,154,90,.2);
      box-shadow:0 18px 50px rgba(35,25,17,.12),inset 0 1px 0 rgba(255,255,255,.55);
    }
    .card,.opening-card{
      border-radius:30px;
    }
    .card{
      padding:28px;margin-bottom:20px;
      border:1.5px solid rgba(199,154,90,.2);
      box-shadow:0 18px 50px rgba(35,25,17,.12),inset 0 1px 0 rgba(255,255,255,.35);
    }
    .hero{
      text-align:center;display:flex;flex-direction:column;justify-content:center;gap:12px;min-height:56vh;padding-top:12px;padding-bottom:12px;
    }
    .hero h1{
      font-size:clamp(3rem,10vw,6rem);line-height:.95;
      background:linear-gradient(180deg,#cda061,#8f6327);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      letter-spacing:.6px;font-weight:600;text-shadow:0 1px 0 rgba(255,255,255,.5);
    }
    .lead,.muted,.info-box p,.rekening-box p,.date-sub,.qris-caption,.couple-text p,.opening-message p,.location-detail p{
      color:var(--muted);line-height:1.95;font-size:1.02rem;
    }
    .btn{
      border:none;border-radius:999px;padding:13px 20px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
      text-decoration:none;transition:.2s ease;
    }
    .btn:hover{transform:translateY(-2px)}

      background:linear-gradient(135deg,#d2a561,#9c6d2d);
      color:#fff;
